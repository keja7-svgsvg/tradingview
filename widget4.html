<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>SOFR & FX</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #0f0f0f;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    .wrap {
      width: 100%;
      height: 430px;
      background: #131722;
      overflow: hidden;
    }

    .tabs {
      display: flex;
      gap: 14px;
      padding: 10px 14px 0;
      background: #131722;
    }

    .tab {
      border: 0;
      background: transparent;
      color: #e6e6e6;
      font-size: 18px;
      font-weight: 700;
      padding: 8px 14px;
      border-radius: 8px;
      cursor: pointer;
    }

    .tab.active {
      background: #2a2a2a;
      color: #ffffff;
    }

    #widget {
      width: 100%;
      height: 380px;
      overflow: hidden;
      background: #131722;
    }

    .tradingview-widget-container,
    .tradingview-widget-container__widget {
      width: 100%;
      height: 380px;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="tabs">
      <button class="tab active" data-symbol="FRED:SOFR" data-name="SOFR">SOFR</button>
      <button class="tab" data-symbol="FX:AUDUSD" data-name="AUD / USD">AUD</button>
      <button class="tab" data-symbol="FX:USDCAD" data-name="USD / CAD">CAD</button>
      <button class="tab" data-symbol="FX:EURUSD" data-name="EUR / USD">EUR</button>
      <button class="tab" data-symbol="FX:GBPUSD" data-name="GBP / USD">GBP</button>
    </div>

    <div id="widget"></div>
  </div>

  <script>
    function loadWidget(symbol, name) {
      const widget = document.getElementById("widget");

      widget.innerHTML = `
        <div class="tradingview-widget-container">
          <div class="tradingview-widget-container__widget"></div>
        </div>
      `;

      const script = document.createElement("script");
      script.type = "text/javascript";
      script.src = "https://s3.tradingview.com/external-embedding/embed-widget-symbol-overview.js";
      script.async = true;

      script.innerHTML = JSON.stringify({
        symbols: [[name, symbol]],
        chartOnly: false,
        width: "100%",
        height: 380,
        locale: "en",
        colorTheme: "dark",
        autosize: false,
        showVolume: false,
        showMA: false,
        hideDateRanges: false,
        hideMarketStatus: true,
        hideSymbolLogo: true,
        scalePosition: "right",
        scaleMode: "Normal",
        fontFamily: "-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif",
        fontSize: "10"
      });

      widget.querySelector(".tradingview-widget-container").appendChild(script);
    }

    document.querySelectorAll(".tab").forEach(button => {
      button.addEventListener("click", () => {
        document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
        button.classList.add("active");
        loadWidget(button.dataset.symbol, button.dataset.name);
      });
    });

    loadWidget("FRED:SOFR", "SOFR");
  </script>
</body>
</html>
