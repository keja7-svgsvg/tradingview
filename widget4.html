<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>SOFR & FX</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #0f0f0f;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    .widget {
      margin-bottom: 8px;
    }
  </style>
</head>

<body>

  <!-- SOFR -->

  <div class="widget">
    <div class="tradingview-widget-container">
      <div class="tradingview-widget-container__widget"></div>

      <script type="text/javascript"
        src="https://s3.tradingview.com/external-embedding/embed-widget-symbol-overview.js"
        async>
      {
        "symbols": [
          [
            "SOFR",
            "FRED:SOFR"
          ]
        ],
        "chartOnly": true,
        "width": "100%",
        "height": 160,
        "locale": "en",
        "colorTheme": "dark",
        "autosize": true,
        "hideDateRanges": false,
        "hideMarketStatus": true,
        "hideSymbolLogo": true,
        "scalePosition": "right",
        "scaleMode": "Normal",
        "fontFamily": "-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif",
        "fontSize": "10"
      }
      </script>
    </div>
  </div>

  <!-- FX -->

  <div class="widget">
    <div class="tradingview-widget-container">
      <div class="tradingview-widget-container__widget"></div>

      <script type="text/javascript"
        src="https://s3.tradingview.com/external-embedding/embed-widget-market-overview.js"
        async>
      {
        "colorTheme": "dark",
        "dateRange": "12M",
        "locale": "en",
        "showChart": false,
        "showSymbolLogo": false,
        "isTransparent": false,
        "width": "100%",
        "height": 220,
        "tabs": [
          {
            "title": "FX",
            "symbols": [
              {
                "s": "FX:AUDUSD",
                "d": "AUD / USD"
              },
              {
                "s": "FX:USDCAD",
                "d": "USD / CAD"
              },
              {
                "s": "FX:EURUSD",
                "d": "EUR / USD"
              },
              {
                "s": "FX:GBPUSD",
                "d": "GBP / USD"
              }
            ]
          }
        ]
      }
      </script>
    </div>
  </div>

</body>
</html>
