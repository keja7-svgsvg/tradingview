<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Market Dashboard</title>
<style>
body {
    margin: 0;
    background: #0f0f0f;
    padding: 10px;
}
</style>
</head>

<body>

<div class="tradingview-widget-container">
  <div class="tradingview-widget-container__widget"></div>

  <script type="text/javascript"
  src="https://s3.tradingview.com/external-embedding/embed-widget-market-overview.js"
  async>
  {
    "colorTheme": "dark",
    "dateRange": "12M",
    "locale": "en",
    "showChart": true,
    "showSymbolLogo": true,
    "isTransparent": false,
    "width": "100%",
    "height": 900,
    "tabs": [
      {
        "title": "Markets",
        "symbols": [
          {
            "s": "FOREXCOM:SPXUSD",
            "d": "S&P 500"
          },
          {
            "s": "FOREXCOM:NSXUSD",
            "d": "Nasdaq 100"
          },
          {
            "s": "FOREXCOM:DJI",
            "d": "Dow Jones"
          }
        ]
      },
      {
        "title": "Rates",
        "symbols": [
          {
            "s": "FRED:SOFR",
            "d": "SOFR"
          },
          {
            "s": "TVC:US10Y",
            "d": "US 10Y Treasury"
          }
        ]
      },
      {
        "title": "Volatility",
        "symbols": [
          {
            "s": "CBOE:VIX",
            "d": "VIX"
          }
        ]
      },
      {
        "title": "Commodities",
        "symbols": [
          {
            "s": "TVC:USOIL",
            "d": "WTI Crude"
          },
          {
            "s": "OANDA:XAUUSD",
            "d": "Gold"
          }
        ]
      },
      {
        "title": "Crypto",
        "symbols": [
          {
            "s": "COINBASE:BTCUSD",
            "d": "Bitcoin"
          }
        ]
      }
    ]
  }
  </script>
</div>

</body>
</html>
