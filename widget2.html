<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>PSG Market Dashboard</title>
  <style>
    body {
      margin: 0;
      padding: 18px;
      background: #0f0f0f;
      color: #ffffff;
      font-family: Inter, Arial, sans-serif;
    }

    .header {
      margin-bottom: 18px;
    }

    .header h1 {
      margin: 0;
      font-size: 24px;
      font-weight: 700;
    }

    .header p {
      margin: 6px 0 0;
      color: #a8a8a8;
      font-size: 13px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
    }

    .card {
      background: #171717;
      border: 1px solid #2a2a2a;
      border-radius: 14px;
      padding: 12px;
      min-height: 320px;
      overflow: hidden;
    }

    .card h2 {
      margin: 0 0 10px;
      font-size: 15px;
      font-weight: 600;
      color: #e6e6e6;
    }

    .tradingview-widget-container {
      height: 280px;
    }

    @media (max-width: 900px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <div class="header">
    <h1>PSG Daily Market Dashboard</h1>
    <p>Markets • Rates • Credit • Commodities • FX • Crypto</p>
  </div>

  <div class="grid">
    <div class="card">
      <h2>S&P 500</h2>
      <div class="tradingview-widget-container">
        <div id="spx"></div>
      </div>
    </div>

    <div class="card">
      <h2>Nasdaq 100</h2>
      <div class="tradingview-widget-container">
        <div id="ndx"></div>
      </div>
    </div>

    <div class="card">
      <h2>Russell 2000</h2>
      <div class="tradingview-widget-container">
        <div id="rut"></div>
      </div>
    </div>

    <div class="card">
      <h2>US 10Y Treasury</h2>
      <div class="tradingview-widget-container">
        <div id="us10y"></div>
      </div>
    </div>

    <div class="card">
      <h2>VIX</h2>
      <div class="tradingview-widget-container">
        <div id="vix"></div>
      </div>
    </div>

    <div class="card">
      <h2>Dollar Index</h2>
      <div class="tradingview-widget-container">
        <div id="dxy"></div>
      </div>
    </div>

    <div class="card">
      <h2>WTI Crude</h2>
      <div class="tradingview-widget-container">
        <div id="wti"></div>
      </div>
    </div>

    <div class="card">
      <h2>Gold</h2>
      <div class="tradingview-widget-container">
        <div id="gold"></div>
      </div>
    </div>

    <div class="card">
      <h2>Bitcoin</h2>
      <div class="tradingview-widget-container">
        <div id="btc"></div>
      </div>
    </div>
  </div>

  <script src="https://s3.tradingview.com/tv.js"></script>
  <script>
    function makeChart(container, symbol) {
      new TradingView.widget({
        autosize: true,
        symbol: symbol,
        interval: "D",
        timezone: "America/New_York",
        theme: "dark",
        style: "2",
        locale: "en",
        hide_top_toolbar: true,
        hide_side_toolbar: true,
        allow_symbol_change: false,
        save_image: false,
        container_id: container
      });
    }

    makeChart("spx", "SP:SPX");
    makeChart("ndx", "NASDAQ:NDX");
    makeChart("rut", "RUSSELL:RUT");
    makeChart("us10y", "TVC:US10Y");
    makeChart("vix", "CBOE:VIX");
    makeChart("dxy", "TVC:DXY");
    makeChart("wti", "TVC:USOIL");
    makeChart("gold", "OANDA:XAUUSD");
    makeChart("btc", "BINANCE:BTCUSDT");
  </script>
</body>
</html>
